    /* Estilos base */
    body { background-color: #050505; color: #e5e5e5; font-family: sans-serif; }
    
    /* Contenedor principal con efecto cristal */
    .bg-premium { 
        background: rgba(18, 18, 18, 0.7); 
        backdrop-filter: blur(12px); 
        border: 1px solid rgba(255, 255, 255, 0.05); 
    }
    
    .text-gold { color: #ffd95a; }

    /* Clases para el efecto 3D del perfil */
    .perspective { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    .is-flipped { transform: rotateY(180deg); }

    /* REPRODUCTOR CORREGIDO: Sin blur para evitar el halo negro */

        background: rgba(255, 255, 255, 0.04); /* Fondo sutil sin desenfoque */

        box-shadow: none !important; /* Asegura que no haya sombras */

    .acordeon-contenido {
        background: transparent !important; /* Elimina el fondo gris oscuro */

        border: none !important;            /* Elimina bordes del contenedor padre */

#reader {
        width: 100% !important;
        min-height: 350px !important; /* IMPORTANTE: Esto le da el espacio a la cámara */

        border-radius: 1rem;
    }
    /* Aseguramos que el video dentro se ajuste */
    #reader video {
        width: 100% !important;
        object-fit: cover !important;
    }

window.obtenerIconoPorRol = (rolDetalle) => {
        const rol = (rolDetalle || '').toLowerCase();
        if (rol.includes('piano')) return 'KEYS';
        if (rol.includes('guitarra')) return 'GTR';
        if (rol.includes('bateria')) return 'DRUMS';
        if (rol.includes('bajo')) return 'BAJO';
        if (rol.includes('voz') || rol.includes('soprano') || rol.includes('tenor') || rol.includes('baritono')) return 'VOZ';
        if (rol.includes('percusion')) return 'PERCU';
        if (rol.includes('saxofon')) return 'SAXO';
        if (rol.includes('trompeta')) return 'TROMPETA';
        if (rol.includes('violin')) return 'VIOLIN';
        return 'USR';
    };

window.loginVoluntario = async () => {
    const emailInput = document.getElementById('login-email').value.toLowerCase();
    if (!emailInput) return alert("Ingresa un correo");

    try {
        const q = query(collection(db, "voluntarios"), where("email", "==", emailInput));
        const snap = await getDocs(q);

        if (!snap.empty) {
            currentUser = { id: snap.docs[0].id, ...snap.docs[0].data() };
            const nombreDisplay = currentUser.nickname || currentUser.nombre || 'Voluntario';
            document.getElementById('nombre-voluntario').value = nombreDisplay;
            console.log("MI EQUIPO:", currentUser.equipo);
            
            // --- PERSISTENCIA: Guardamos el correo para recordarlo al recargar ---

            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('panel-view').classList.remove('hidden');
            
            // Llenado de campos
            document.getElementById('edit-nombre').value = currentUser.nombre || '';
            document.getElementById('edit-nickname').value = currentUser.nickname || '';
            document.getElementById('edit-telefono').value = currentUser.telefono || '';
            document.getElementById('edit-email').value = currentUser.email || '';
            document.getElementById('edit-direccion').value = currentUser.direccion || '';
            document.getElementById('edit-rol').value = currentUser.detalle || currentUser.rol || '';

            // Icono del equipo
            const icono = window.obtenerIconoPorRol(currentUser.detalle || currentUser.rol);
            document.getElementById('team-badge').innerHTML = `${icono} ${currentUser.equipo || 'Sin equipo asignado'}`;
            
            // --- AUTO-CARGA: Traemos el setlist al entrar ---

        } else {

        console.error("Error al buscar:", err);

};

window.flipCard = async () => {
    const card = document.getElementById('card-inner');

async function cargarIntegrantesTeam(equipoNombre) {
    const listContainer = document.getElementById('team-list');
    const title = document.getElementById('team-name-title');
    
    if (!equipoNombre) {
        listContainer.innerHTML = '<p class="text-gray-500 text-xs text-center">No tienes un equipo asignado.</p>';
        return;
    }

    title.innerText = equipoNombre;
    listContainer.innerHTML = '<p class="text-gray-500 text-xs text-center">Buscando integrantes...</p>';

    try {
        // Aseguramos que buscamos el equipo exacto
        const q = query(collection(db, "voluntarios"), where("equipo", "==", equipoNombre));
        const snap = await getDocs(q);

        listContainer.innerHTML = ''; // Limpiar el "Buscando..."

        if (snap.empty) {
            listContainer.innerHTML = '<p class="text-gray-500 text-xs text-center">No hay otros miembros en este equipo.</p>';
        } else {
            snap.forEach((doc) => {
                const v = doc.data();
                const icon = window.obtenerIconoPorRol(v.detalle || v.rol);
                
                listContainer.innerHTML += `
                    <div class="flex items-center gap-4 bg-[#121212] p-3 rounded-lg border border-gray-800/50">
                        <span class="text-[10px] font-bold bg-gray-900 w-10 h-10 flex items-center justify-center rounded-full border border-gray-800 text-gold">${icon}</span>
                        <div>
                            <p class="text-xs font-bold text-white">${v.nickname || v.nombre}</p>
                            <p class="text-[9px] text-gray-500 uppercase">${v.detalle || v.rol || ''}</p>
                        </div>
                    </div>
                `;
            });
        }
    } catch (err) {
        console.error("Error al cargar equipo:", err);
        listContainer.innerHTML = '<p class="text-red-500 text-xs text-center">Error al cargar datos.</p>';
    }
}

window.mostrarTab = async (tabName) => {
    // 1. Selector de IDs
    const tabs = {
        'perfil': 'card-inner',
        'ensayos': 'tab-ensayos',
        'setlist': 'tab-setlist',
        'asistencia': 'tab-asistencia'
    };

    // 2. Ocultar todos los contenedores usando CLASES (Tailwind) en lugar de estilos en línea
    Object.values(tabs).forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('hidden');
            el.style.display = ''; // Limpiamos el estilo inline que causa conflictos
        }
    });

    // 3. Mostrar el tab solicitado
    const idReal = tabs[tabName];
    const tabElement = document.getElementById(idReal);
    
    if (tabElement) {
        tabElement.classList.remove('hidden');
        tabElement.style.display = 'block'; // Forzamos visibilidad aquí

        // 4. Lógica específica de ASISTENCIA
if (tabName === 'asistencia') {
    const params = new URLSearchParams(window.location.search);
    const tokenURL = params.get('token');
    const fechaHoy = new Date().toISOString().split('T')[0];
    const usuarioLogueado = localStorage.getItem('deep_user_email');
    
    const msgNoQr = document.getElementById('mensaje-no-qr');
    const formAsistencia = document.getElementById('formulario-asistencia');
    const readerContainer = document.getElementById('reader-container');

    // Reset visual inicial
    readerContainer.classList.add('hidden');
    msgNoQr.classList.add('hidden');
    formAsistencia.classList.add('hidden');

    try {
        // --- NUEVO: VERIFICACIÓN SIEMPRE ACTIVA ---
        if (usuarioLogueado) {
            const asistRef = window.collection(window.db, "asistencia");
            const q = window.query(asistRef, 
                window.where("email", "==", usuarioLogueado), 
                window.where("fecha", "==", fechaHoy)
            );
            const querySnapshot = await window.getDocs(q);

            if (!querySnapshot.empty) {
                // YA MARCÓ: Bloqueamos todo y mostramos mensaje
                msgNoQr.classList.remove('hidden');
                msgNoQr.innerHTML = `
                    <div class="text-center p-6 bg-[#121212] rounded-xl border border-gold/20">
                        <p class="text-gold font-bold mb-2">¡Asistencia registrada!</p>
                        <p class="text-gray-400 text-xs">Ya marcaste tu asistencia para hoy. Nos vemos pronto.</p>
                    </div>`;
                return; // Finalizamos aquí, no hace falta revisar nada más
            }
        }

        // --- SI LLEGA AQUÍ, ES PORQUE NO HA MARCADO ASISTENCIA ---
        if (tokenURL) {
            msgNoQr.classList.remove('hidden');
            msgNoQr.innerHTML = '<p class="text-white">Validando acceso...</p>';

            const tokenRef = window.doc(window.db, "tokens", "diario");
            const snap = await window.getDoc(tokenRef);

            if (snap.exists() && snap.data().token === tokenURL) {
                msgNoQr.classList.add('hidden');
                formAsistencia.classList.remove('hidden');
                formAsistencia.style.display = 'block';
            } else {
                msgNoQr.innerHTML = '<p class="text-red-500">QR inválido o expirado.</p>';
                msgNoQr.classList.remove('hidden');
            }
        } else {
            // No ha marcado Y no tiene token: mostrar botón de escanear
            msgNoQr.classList.remove('hidden');
            msgNoQr.innerHTML = `
                <div class="text-center">
                    <p class="text-gray-500 text-sm mb-4">No has escaneado el QR de hoy.</p>
                    <button onclick="window.iniciarEscaneoUI()" class="w-full py-4 px-6 bg-[#ffd95a] text-black font-bold rounded-lg transition-all hover:bg-[#e6c250] active:scale-95">
                        Escanear Código QR
                    </button>
                </div>`;
        }
    } catch (e) {
        console.error(e);
        msgNoQr.classList.remove('hidden');
        msgNoQr.innerHTML = '<p class="text-red-500">Error de conexión.</p>';
    }
}
           
    }

    // 4. Actualizar botones del menú
    document.querySelectorAll('#tabs-nav button').forEach(btn => {
        const btnText = btn.innerText.toLowerCase().trim();
        if (btnText === tabName) {
            btn.className = "text-[10px] uppercase tracking-widest text-gold border-b border-gold pb-1";
        } else {
            btn.className = "text-[10px] uppercase tracking-widest text-gray-500 hover:text-white transition";
        }
    });
};

async function cargarSetlist() {
    const lista = document.getElementById('lista-canciones');
    if (!lista) return;

    try {
        const q = query(collection(db, "setlists"), where("equipo", "==", currentUser.equipo));
        const snap = await getDocs(q);

        let html = '';
        for (const setlistDoc of snap.docs) {
            const data = setlistDoc.data();
            const cancionesDetalladas = await Promise.all((data.canciones || []).map(async (c) => {
                const songSnap = await getDoc(doc(db, "songs", c.id));
                return songSnap.exists() ? { ...c, ...songSnap.data() } : c;
            }));

            html += `
            <div class="bg-[#121212] border border-gray-800 rounded-lg p-4 mb-6">
                <h4 class="text-gold font-bold mb-4 uppercase text-[11px] tracking-widest">${data.nombre}</h4>
                ${cancionesDetalladas.map((c, i) => {
                    const songId = `song-${setlistDoc.id}-${i}`;
                    return `
                        <div class="border-b border-gray-800 last:border-0">
                            <button onclick="toggleAcordeon('${songId}')" 
                                    class="w-full py-4 flex justify-between items-center text-white font-bold hover:text-gold transition">
                                <div class="flex flex-col items-start">
                                    <span class="text-[13px]">${i + 1}. ${c.titulo}</span>
                                    <div class="flex gap-3 mt-1">
                                        ${c.nota ? `<span class="text-[9px] text-gray-500 uppercase">Nota: ${c.nota}</span>` : ''}
                                        ${c.bpm ? `<span class="text-[9px] text-gray-500 uppercase">${c.bpm} BPM</span>` : ''}
                                    </div>
                                </div>
                                <span class="text-[10px] opacity-50">▼</span>
                            </button>

                            <div id="${songId}" class="acordeon-contenido hidden pb-4 px-2 bg-transparent rounded">
                               ${c.audioUrl ? `
                                <div class="mt-2 mb-4"> 
                                    <input type="range" id="progress-${songId}" value="0" max="100" 
                                           class="w-full h-1 bg-gray-800 rounded-full appearance-none cursor-pointer accent-gold mb-5">
                                    
                                    <div class="flex items-center justify-between px-2">
                                        <button onclick="controlAudio('mute', '${songId}')" 
                                                class="w-10 h-10 flex items-center justify-center text-white/40 hover:text-white transition-colors">
                                            <img id="icon-volumen-${songId}" src="sound.png" class="w-5 h-5 invert brightness-200">
                                        </button>

                                        <button onclick="controlAudio('play', '${songId}')" 
                                                class="w-12 h-12 flex items-center justify-center bg-white rounded-full hover:scale-105 transition-transform shadow-none">
                                            <span id="icon-play-${songId}" class="text-lg text-black" style="margin-left: 2px;">▶</span>
                                        </button>

                                        <div id="time-display-${songId}" class="w-10 text-right text-[10px] font-mono text-white/30">0:00</div>
                                    </div>
                                    <audio id="audio-${songId}" src="${c.audioUrl}"></audio>
                                </div>
                                ` : ''}
                                
                                ${c.pdfUrl ? `
                                    <button onclick="window.open('${c.pdfUrl}', '_blank')" 
                                            class="mt-1 w-full py-2 border border-yellow-500/20 text-yellow-500 text-[10px] font-bold rounded uppercase hover:bg-yellow-500 hover:text-black transition">
                                        Ver Partitura (PDF)
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>`;
        }
        lista.innerHTML = html;
    } catch (err) {
        console.error("Error cargando setlist:", err);
    }
}



window.controlAudio = (accion, id) => {
    const audio = document.getElementById(`audio-${id}`);
    const progress = document.getElementById(`progress-${id}`);
    const timeDisplay = document.getElementById(`time-display-${id}`);
    const playIcon = document.getElementById(`icon-play-${id}`);
    const volIcon = document.getElementById(`icon-volumen-${id}`);

    if (accion === 'play') {
        if (audio.paused) {
            audio.play();
            // Icono plano de PAUSA usando texto
            playIcon.innerText = "❚❚"; 
            playIcon.style.fontSize = "14px";
        } else {
            audio.pause();
            // Icono plano de PLAY usando texto
            playIcon.innerText = "▶";
            playIcon.style.fontSize = "16px";
        }
    } 
    
    else if (accion === 'mute') {
        audio.muted = !audio.muted;
        // Cambiamos la fuente de la imagen (usando las imágenes sound.png / silence.png)
        volIcon.src = audio.muted ? "silence.png" : "sound.png";
    }

    // Actualización de progreso y tiempo
    audio.ontimeupdate = () => {
        const valor = (audio.currentTime / audio.duration) * 100;
        progress.value = valor || 0;
        
        // Formatear tiempo (minutos:segundos)
        const mins = Math.floor(audio.currentTime / 60);
        const secs = Math.floor(audio.currentTime % 60);
        timeDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    };

    // Saltar a un punto específico al mover la barra
    progress.oninput = () => {
        audio.currentTime = (progress.value / 100) * audio.duration;
    };
};




window.toggleAcordeon = function(idSeleccionado) {
        // 1. Buscamos todos los elementos que sean contenido de acordeón
        const todosLosContenidos = document.querySelectorAll('.acordeon-contenido');
        const elementoAActivar = document.getElementById(idSeleccionado);

        // 2. Si el elemento ya está visible, solo lo cerramos
        if (!elementoAActivar.classList.contains('hidden')) {
            elementoAActivar.classList.add('hidden');
            return;
        }

        // 3. Si no, cerramos TODOS los demás primero
        todosLosContenidos.forEach(el => {
            el.classList.add('hidden');
        });

        // 4. Y finalmente abrimos el que queremos
        elementoAActivar.classList.remove('hidden');
    };


    // Se ejecuta apenas carga la página
    document.addEventListener('DOMContentLoaded', () => {
    const emailGuardado = localStorage.getItem('deep_user_email');
    if (emailGuardado) {
        // 1. Autologin
        document.getElementById('login-email').value = emailGuardado;
        
        // 2. Ejecutamos el login
        window.loginVoluntario();
        
        // 3. DISPARAMOS LA CARGA DE ENSAYOS AQUÍ
        // Agregamos un pequeño delay (setTimeout) por si la base de datos 
        // tarda unos milisegundos en inicializar al hacer login
        setTimeout(() => {
            if (typeof window.cargarEnsayos === 'function') {
                window.cargarEnsayos();
                console.log("Cargando ensayos tras login automático...");
            }
        }, 500);
    }
});

    // Opcional: Botón para cerrar sesión y borrar el recordatorio
    window.cerrarSesion = () => {
        localStorage.removeItem('deep_user_email');
        location.reload(); // Recarga la página y vuelve al login
    };




window.renderizarEnsayosVoluntario = function(ensayos) {
    const contenedor = document.getElementById('lista-ensayos');
    if (!contenedor) return;

    if (ensayos.length === 0) {
        contenedor.innerHTML = '<p class="text-[10px] text-gray-500">No hay eventos programados.</p>';
        return;
    }

    // Ordenar cronológicamente
    ensayos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

    const colores = {
        'Ensayo': 'border-gray-500',
        'Servicio General': 'border-gold',
        'Ensayo de Equipo': 'border-blue-400',
        'Soundcheck': 'border-purple-500'
    };

    contenedor.innerHTML = ''; 
    
    ensayos.forEach(ev => {
        // Creamos la fecha localmente para evitar desfases de zona horaria
        const [year, month, day] = ev.fecha.split('-').map(Number);
        const fechaObj = new Date(year, month - 1, day);
        
        // Formateador para día de la semana y mes
        const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
        const fechaFormateada = fechaObj.toLocaleDateString('es-ES', opciones);

        const colorBorde = colores[ev.tipo] || 'border-gray-800';
        
        const div = document.createElement('div');
        div.className = `border-b border-gray-800 p-4 flex justify-between items-center group hover:bg-[#1a1a1a] transition`;
        
        div.innerHTML = `
            <div class="border-l-2 ${colorBorde} pl-4">
                <p class="text-[10px] font-bold uppercase tracking-widest text-white">${ev.tipo}</p>
                <p class="text-[10px] text-gray-400 mt-1 capitalize">${fechaFormateada} | ${ev.hora}</p>
            </div>
            <div class="px-2 py-1 rounded border border-gray-700 text-[9px] text-gray-500 font-bold uppercase">
                ${ev.equipo}
            </div>
        `;
        contenedor.appendChild(div);
    });
}




window.cargarEnsayos = async function() {
    try {
        const querySnapshot = await window.getDocs(window.collection(window.db, "ensayos"));
        const lista = [];
        querySnapshot.forEach(doc => lista.push({ id: doc.id, ...doc.data() }));
        window.renderizarEnsayosVoluntario(lista);
    } catch (err) {
        console.error("Error al cargar agenda:", err);
    }
}



   window.addEventListener('load', () => {
    // Solo cargamos los datos. No forzamos visibilidad aquí.
    setTimeout(() => {
        if (typeof window.cargarEnsayos === 'function') window.cargarEnsayos();
    }, 500);

    window.marcarAsistencia = async function() {
    const params = new URLSearchParams(window.location.search);
    const tokenURL = params.get('token');
    const fechaHoy = new Date().toISOString().split('T')[0]; // Fecha de hoy
    const nombre = document.getElementById('nombre-voluntario').value.trim();

    if (!tokenURL) {
        alert("Error: No se detectó un token en la sesión.");
        return;
    }

    try {
        await window.addDoc(window.collection(window.db, "asistencia"), {
            nombreVoluntario: nombre,
            email: localStorage.getItem('deep_user_email'),
            fecha: fechaHoy, // Usamos la fecha generada aquí
            hora: new Date().toLocaleTimeString('es-GT'),
            timestamp: new Date()
        });

        alert("¡Asistencia registrada con éxito!");
        window.location.href = 'voluntarios.html'; // Recarga limpia
    } catch (err) {
        console.error("Error al registrar:", err);
        alert("Error al registrar asistencia.");
    }
};



// Variable global
let html5QrCode;

window.iniciarEscaneoUI = () => {
    // 1. Buscamos o creamos el input oculto
    let fileInput = document.getElementById('hidden-qr-input');
    if (!fileInput) {
        fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.id = 'hidden-qr-input';
        fileInput.accept = 'image/*';
        // ESTA LÍNEA ABRE LA CÁMARA DIRECTAMENTE EN MÓVILES
        fileInput.setAttribute('capture', 'environment'); 
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);

        // 2. Lógica de procesamiento automática
        fileInput.onchange = async (e) => {
            if (e.target.files.length === 0) return;
            
            const file = e.target.files[0];
            const qrScanner = new Html5Qrcode("reader");

            try {
                // Escaneo automático de la foto recién tomada
                const decodedText = await qrScanner.scanFile(file, true);
                procesarToken(decodedText);
            } catch (err) {
                alert("No se pudo leer el QR. Asegúrate de enfocar bien el código.");
            }
        };
    }

    // 3. Disparamos la acción
    fileInput.click();
};

// Lógica de navegación centralizada
async function procesarToken(decodedText) {
    let token = decodedText.includes("?") ? new URL(decodedText).searchParams.get("token") : decodedText;
    const nuevaUrl = new URL(window.location.href);
    nuevaUrl.searchParams.set("token", token);
    window.history.pushState({}, '', nuevaUrl);
    await window.mostrarTab('asistencia');
}

window.cerrarEscaneo = () => {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById('reader-container').classList.add('hidden');
            document.getElementById('mensaje-no-qr').classList.remove('hidden');
        }).catch(err => console.log(err));
    }
};
