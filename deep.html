// Configuración
const firebaseConfig = {
    apiKey: "AIzaSyBMp-j9Mk6VZ68SO8dUzgZgfXodIM9Ibys",

    projectId: "cddmusica-d8f92",
    storageBucket: "cddmusica-d8f92.firebasestorage.app",

    appId: "1:490870638033:web:af7075a3da6be99ca1ccf0"
};

// Inicialización
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// ASIGNACIÓN GLOBAL (Para que tu HTML pueda usar estas funciones desde cualquier parte)
window.db = db;
window.storage = storage;

// Funciones de Storage
window.ref = ref;
window.uploadBytes = uploadBytes;
window.uploadBytesResumable = uploadBytesResumable;
window.getDownloadURL = getDownloadURL;

// Funciones de Firestore
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.getDoc = getDoc; // <--- ESTO ES LO QUE FALTABA
window.query = query;
window.doc = doc;
window.updateDoc = updateDoc;
window.deleteDoc = deleteDoc;
window.idSetlistEditando = null; 


window.limpiarModalCancion = function() {
    console.log("Limpiando modal...");
    
    // 1. Resetear el formulario (el método estándar)
    const form = document.getElementById('form-cancion');
    if (form) form.reset();
    
    // 2. Limpieza "Fuerza Bruta" (asegura que todo esté vacío)
    const idsAborrar = ['edit-cancion-id', 'titulo', 'autor', 'nota', 'bpm', 'audio-file', 'pdf-file'];
    idsAborrar.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    
    // 3. Limpiar los textos de los nombres de archivo
    document.getElementById('nombre-archivo-audio').innerText = '';
    document.getElementById('nombre-archivo-pdf').innerText = '';
    
    // 4. Ocultar el modal
    document.getElementById('modal-cancion').classList.add('hidden');
};


window.verificarLogin = function() {
    const pass = document.getElementById('admin-pass').value;
    const loginScreen = document.getElementById('login-screen');
    
    if (pass === "Admin1010") {
        // 1. Guardamos el estado en el navegador
        localStorage.setItem('deepartment_auth', 'true');
        
        loginScreen.style.transition = "opacity 0.8s ease, visibility 0.8s";
        loginScreen.style.opacity = "0";
        loginScreen.style.visibility = "hidden";
    } else {
        const input = document.getElementById('admin-pass');
        input.classList.add('border-red-500');
        input.value = ""; 
        setTimeout(() => { input.classList.remove('border-red-500'); }, 500);
    }
}

window.logout = function() {
    const loginScreen = document.getElementById('login-screen');
    const input = document.getElementById('admin-pass');
    
    // 1. Limpiar el input
    if (input) input.value = "";
    
    // 2. Preparar el estado inicial para la transición
    // Aseguramos que display sea flex para que el elemento ocupe espacio
    loginScreen.style.display = "flex"; 
    // Mantenemos la opacidad en 0 antes de iniciar
    loginScreen.style.opacity = "0";
    loginScreen.style.visibility = "visible";
    
    // 3. Forzamos el "reflow" del navegador para que detecte el cambio de opacidad
    // Esto es más efectivo que un simple setTimeout corto
    void loginScreen.offsetWidth; 
    
    // 4. Aplicamos la transición suave
    loginScreen.style.transition = "opacity 0.8s ease, visibility 0.8s";
    loginScreen.style.opacity = "1";
    
    // 5. Reiniciar video
    if (typeof player !== 'undefined' && player.seekTo) {
        player.seekTo(180);
        player.playVideo();
    }
};

   window.guardarCancion = async (datos, audioFile, pdfFile) => {
    // Referencias a los elementos del DOM
    const btn = document.getElementById('btn-guardar-cancion');
    const barra = document.getElementById('barra-progreso');
    const contenedor = document.getElementById('contenedor-progreso');
    const texto = document.getElementById('texto-progreso');

    // 1. Mostrar estado de carga
    if (btn) btn.disabled = true;
    if (contenedor) contenedor.classList.remove('hidden');

    try {
        let audioUrl = datos.audioUrl || ''; // Mantenemos la URL previa si estamos editando
        let pdfUrl = datos.pdfUrl || '';

        // 2. Subir Audio (solo si hay un archivo nuevo)
        if (audioFile) {
            const uniqueAudioName = `${Date.now()}_${audioFile.name}`;
            const audioRef = window.ref(window.storage, 'audio/' + uniqueAudioName);
            
            const uploadTask = window.uploadBytesResumable(audioRef, audioFile);
            
            await new Promise((resolve, reject) => {
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        if (barra) barra.style.width = progress + '%';
                        if (texto) texto.innerText = `Subiendo audio: ${Math.round(progress)}%`;
                    },
                    (error) => reject(error),
                    () => resolve()
                );
            });
            audioUrl = await window.getDownloadURL(uploadTask.snapshot.ref);
        }

        // 2.5 Subir PDF (si existe archivo nuevo)
        if (pdfFile) {
            const uniquePdfName = `${Date.now()}_${pdfFile.name}`;
            const pdfRef = window.ref(window.storage, 'pdf/' + uniquePdfName);
            await window.uploadBytes(pdfRef, pdfFile);
            pdfUrl = await window.getDownloadURL(pdfRef);
        }

        // 3. Guardar datos en Firestore
        const idCancion = document.getElementById('edit-cancion-id').value;

        if (idCancion) {
            // EDITAR: Actualizar documento existente
            const docRef = window.doc(window.db, "songs", idCancion);
            await window.updateDoc(docRef, { 
                ...datos, 
                audioUrl, 
                pdfUrl, 
                actualizado: new Date().toISOString() 
            });
            window.showToast("¡Canción actualizada correctamente!");
        } else {
            // NUEVO: Crear nuevo documento
            await window.addDoc(window.collection(window.db, "songs"), { 
                ...datos, 
                audioUrl, 
                pdfUrl, 
                fecha: new Date().toISOString() 
            });
            window.showToast("¡Canción guardada correctamente!");
        }
        
    // 4. Limpiar UI - FUERZA BRUTA
document.getElementById('modal-cancion').classList.add('hidden');

// A. Limpiamos el formulario global, sin importar dónde esté en el DOM
const form = document.getElementById('form-cancion');
if (form) {
    form.reset();
}

// B. LIMPIEZA INDIVIDUAL (Si los IDs existen, se vacían. Punto.)
const campos = ['titulo', 'autor', 'nota', 'bpm', 'edit-cancion-id', 'audio-file', 'pdf-file'];
campos.forEach(id => {
    const el = document.getElementById(id);
    if (el) {

window.editarCancion = async (id) => {

window.agregarCancionPorBusqueda = () => {
    const input = document.getElementById('input-busqueda');
    const busqueda = input.value.toLowerCase();
    
    // Buscamos en el array global que llenamos al cargar el Setlist
    const cancionEncontrada = window.cancionesDisponibles.find(s => 
        s.titulo.toLowerCase() === busqueda
    );

    if (cancionEncontrada) {
        if (!window.setlistTemporal.find(s => s.id === cancionEncontrada.id)) {
            window.setlistTemporal.push(cancionEncontrada);
            window.renderizarListaTemporal();
            input.value = ''; // Limpiar campo tras añadir
        } else {
            window.showToast("¡Esta canción ya está en la lista!");
        }
    } else {
        window.showToast("Selecciona una canción válida de la lista");
    }
};

window.agregarCancionAlSetlist = () => {
    const select = document.getElementById('selector-canciones');
    const id = select.value;
    const titulo = select.options[select.selectedIndex].getAttribute('data-titulo');

    if (id && !window.setlistTemporal.find(s => s.id === id)) {
        window.setlistTemporal.push({ id, titulo });
        window.renderizarListaTemporal();
    } else if (!id) {
        window.showToast("Selecciona una canción primero");
    }
};

window.renderizarListaTemporal = () => {
    const contenedor = document.getElementById('lista-setlist-temporal');
    contenedor.innerHTML = window.setlistTemporal.map((s, index) => `
        <div class="sortable-item flex justify-between items-center bg-black p-3 rounded text-[10px] text-gray-300 border border-gray-800 cursor-move mb-2 group">
            <span class="flex items-center gap-2">
                <span class="text-gray-600">☰</span> ${s.titulo}
            </span>
            <button onclick="window.removerDelSetlist(${index})" class="text-red-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity">X</button>
        </div>
    `).join('');

    // Inicializar Sortable después de renderizar
    new Sortable(contenedor, {
        animation: 150,
        handle: '.sortable-item',
        onEnd: function (evt) {
            // Reordenar el array real cuando termine el arrastre
            const item = window.setlistTemporal.splice(evt.oldIndex, 1)[0];
            window.setlistTemporal.splice(evt.newIndex, 0, item);
        }
    });
};

window.removerDelSetlist = (index) => {
    window.setlistTemporal.splice(index, 1);
    window.renderizarListaTemporal();
};

window.guardarSetlist = async () => {
    const nombre = document.getElementById('nombre-setlist').value;
    const equipo = document.getElementById('select-equipo').value;

    if (!nombre || !equipo || window.setlistTemporal.length === 0) {
        window.showToast("Completa nombre, equipo y añade canciones");
        return;
    }

    const datos = {
        nombre,
        equipo,
        canciones: window.setlistTemporal,
        fecha: new Date().toISOString()
    };

    try {
        if (window.idSetlistEditando) {
            // EDITAR: Referencia al documento específico
            const docRef = window.doc(window.db, "setlists", window.idSetlistEditando);
            await window.updateDoc(docRef, datos);
            window.showToast("Setlist actualizado");
        } else {
            // CREAR: Nuevo documento
            await window.addDoc(window.collection(window.db, "setlists"), datos);
            window.showToast("Setlist creado");
        }

        // --- LIMPIEZA CRÍTICA PARA EVITAR DUPLICADOS ---
        window.idSetlistEditando = null; // IMPORTANTE: Reseteamos el ID
        window.setlistTemporal = [];
        window.renderizarListaTemporal();
        
        // Limpiamos los inputs
        document.getElementById('nombre-setlist').value = '';
        document.getElementById('select-equipo').value = '';

        // Refrescamos la lista
        await window.cargarSetlistsGuardados();
        
    } catch (e) {
        console.error("Error al guardar: ", e);
    }
};

window.filtrarContenido = function() {
    const buscador = document.getElementById('buscador');
    if (!buscador) return;

    const input = buscador.value.toLowerCase();
    const tarjetas = document.querySelectorAll('.voluntario-card');
    
    tarjetas.forEach(card => {
        const nombre = card.getAttribute('data-nombre') ? card.getAttribute('data-nombre').toLowerCase() : '';
        const nickname = card.getAttribute('data-nickname') ? card.getAttribute('data-nickname').toLowerCase() : '';
        
        if (nombre.includes(input) || nickname.includes(input)) {
            card.style.display = "";
        } else {
            card.style.display = "none";
        }
    });
};

window.inicializarDragAndDrop = function() {
    // Verificamos que Sortable esté disponible para evitar errores
    if (typeof Sortable === 'undefined') {
        console.error("SortableJS no está cargado.");
        return;
    }

    document.querySelectorAll('.sortable-list').forEach(el => {
        new Sortable(el, {
            group: 'shared',
            animation: 150,
            onEnd: async (evt) => {
                const idVoluntario = evt.item.dataset.id;
                const nuevoEquipo = evt.to.dataset.equipo || null;
                
                // Usamos window.cambiarEquipo para asegurar acceso global
                if (window.cambiarEquipo) {
                    await window.cambiarEquipo(idVoluntario, nuevoEquipo);
                }
            }
        });
    });
};


window.obtenerIconoPorRol = function(rolDetalle) {
    const rol = (rolDetalle || '').toLowerCase();
    if (rol.includes('piano')) return 'KEYS';
    if (rol.includes('guitarra')) return 'GTR';
    if (rol.includes('bateria')) return 'DRUMS';
    if (rol.includes('bajo')) return 'BAJO';
    if (rol.includes('voz') || rol.includes('soprano') || rol.includes('tenor') || rol.includes('baritono')) return 'VOZ';
    if (rol.includes('percusion')) return 'PERCU';
    if (rol.includes('saxofon')) return 'SAXO';
    if (rol.includes('trompeta')) return 'TROMPETA';
    if (rol.includes('violin')) return 'VIOLIN';
    return 'USR';
};

window.togglePass = function() {
    const pass = document.getElementById('admin-pass');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');
    
    // Verificación de seguridad por si los elementos no existen

    if (pass.type === "password") {
        pass.type = "text";
        if (eyeOpen) eyeOpen.classList.remove('hidden');
        if (eyeClosed) eyeClosed.classList.add('hidden');
    } else {
        pass.type = "password";
        if (eyeOpen) eyeOpen.classList.add('hidden');
        if (eyeClosed) eyeClosed.classList.remove('hidden');

window.guardarEnsayoEnFirebase = async function() {
    // 1. Obtención de datos
    const equipo = document.getElementById('ensayo-equipo').value;
    const fecha = document.getElementById('ensayo-fecha').value;
    const hora = document.getElementById('ensayo-hora').value;
    const noticias = document.getElementById('ensayo-noticias').value;

    // 2. Validación: Si algo falta, no guardamos
    if (!equipo || !fecha || !hora) {
        alert("Por favor, completa el equipo, la fecha y la hora.");
        return; // Detiene la ejecución aquí
    }

    try {
        // 3. Guardado en Firebase
        await window.addDoc(window.collection(window.db, "ensayos"), {
    equipo: document.getElementById('ensayo-equipo').value,
    tipo: document.getElementById('ensayo-tipo').value, // <--- ESTA LÍNEA ES NUEVA
    fecha: document.getElementById('ensayo-fecha').value,
    hora: document.getElementById('ensayo-hora').value,
    noticias: document.getElementById('ensayo-noticias').value,
    fechaRegistro: new Date().toISOString()
});

        // 4. Limpieza del formulario y cierre (si el modal está abierto)
        document.getElementById('form-ensayo').reset();
        const modal = document.getElementById('modal-ensayo');
        if (modal) modal.classList.add('hidden');

        // 5. Feedback y actualización
        window.cargarEnsayos();
        console.log("Ensayo guardado con éxito");
        
        // Si tienes una función showToast, úsala:
        // window.showToast("Ensayo programado con éxito");
        
    } catch (error) {
        console.error("Error al guardar en Firebase:", error);
        alert("Hubo un error al guardar el ensayo. Revisa tu conexión.");
    }
};

window.renderizarEnsayos = function(ensayos) {
    const contenedor = document.getElementById('lista-ensayos');
    contenedor.innerHTML = ''; 

    // 1. Ordenamos cronológicamente antes de pintar
    ensayos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

    // Definimos colores según el tipo para que sea más fácil de leer
    const colores = {
        'Ensayo': 'border-gray-600',
        'Servicio General': 'border-gold',
        'Ensayo de Equipo': 'border-blue-400',
        'Soundcheck': 'border-purple-500'
    };

    ensayos.forEach(ev => {
        const fechaObj = new Date(ev.fecha + 'T' + (ev.hora || '00:00'));
        const fechaFormateada = fechaObj.toLocaleDateString('es-ES', { 
            day: 'numeric', month: 'long', year: 'numeric' 
        });

        // Formato de hora 12h
        let [hh, mm] = (ev.hora || '00:00').split(':');
        const ampm = hh >= 12 ? 'pm' : 'am';
        hh = hh % 12 || 12;
        const horaFormateada = `${hh}${mm !== '00' ? ':' + mm : ''}${ampm}`;

        const colorBorde = colores[ev.tipo] || 'border-gray-800';

        const div = document.createElement('div');
        // Estilo de línea de tiempo con borde lateral personalizado
        div.className = `mb-6 border-l-2 ${colorBorde} pl-4 py-1 bg-[#121212]/50 rounded-r-lg hover:bg-[#1a1a1a] transition`;
        
        div.innerHTML = `
            <div class="flex justify-between items-start">
                <div>
                    <h4 class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">
                        ${fechaFormateada} - ${horaFormateada}
                    </h4>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-white font-bold text-sm">${ev.tipo}</span>
                        <span class="text-gold text-[10px] uppercase font-bold border border-gold/20 px-1 rounded">${ev.equipo}</span>
                    </div>
                    <p class="text-gray-400 text-xs mt-2 italic">${ev.noticias || ''}</p>
                </div>
                <button onclick="eliminarEnsayo('${ev.id}')" class="text-gray-600 hover:text-red-500 transition px-2">✕</button>
            </div>
        `;
        contenedor.appendChild(div);
    });
}


window.abrirModalEnsayo = function() {
    const modal = document.getElementById('modal-ensayo');
    if (modal) {
        modal.classList.remove('hidden');
    } else {
        console.error("El elemento con ID 'modal-ensayo' no existe en el DOM.");
    }
};

window.cargarEnsayos = async function() {
    try {
        // Obtenemos los documentos de la colección "ensayos"
        const querySnapshot = await window.getDocs(window.collection(window.db, "ensayos"));
        const listaEnsayos = [];
        
        querySnapshot.forEach((doc) => {
            listaEnsayos.push({ id: doc.id, ...doc.data() });
        });
        
        // Llamamos a la función que dibuja las tarjetas
        window.renderizarEnsayos(listaEnsayos);
        
    } catch (err) {
        console.error("Error al cargar ensayos desde Firebase:", err);
    }
}

window.eliminarEnsayo = async function(id) {
    // Usamos tu función confirmarAccion que configuramos antes
    window.confirmarAccion(
        "¿Eliminar registro?", 
        "Esta acción no se puede deshacer. El ensayo será eliminado permanentemente de la base de datos.", 
        async () => {
            try {
                // Ejecutamos la eliminación en Firebase
                await window.deleteDoc(window.doc(window.db, "ensayos", id));
                
                // Feedback visual
                if (window.showToast) {
                    window.showToast("Ensayo eliminado con éxito");
                }
                
                // Recargamos la lista para que desaparezca visualmente
                await window.cargarEnsayos(); 
            } catch (err) {
                console.error("Error al eliminar:", err);
                if (window.showToast) {
                    window.showToast("Error al eliminar el ensayo");
                }
            }
        }
    );
};



window.confirmarAccion = (titulo, mensaje, callbackEliminar) => {
    const modal = document.getElementById('modal-confirmacion');
    const btnConfirmar = document.getElementById('btn-confirmar');
    const btnCancelar = document.getElementById('btn-cancelar');

    // Cambiar textos dinámicamente
    modal.querySelector('h2').innerText = titulo;
    modal.querySelector('p').innerText = mensaje;

    // Mostrar el modal
    modal.classList.remove('hidden');

    // Configurar botones
    btnCancelar.onclick = () => modal.classList.add('hidden');
    
    btnConfirmar.onclick = async () => {
        await callbackEliminar(); // Ejecuta la función de borrar (ej: deleteDoc)
        modal.classList.add('hidden');
    };
};



// Función para mostrar el modal y esperar la respuesta
window.pedirConfirmacion = () => {
    return new Promise((resolve) => {
        const modal = document.getElementById('modal-confirmacion');
        const btnConfirmar = document.getElementById('btn-confirmar');
        const btnCancelar = document.getElementById('btn-cancelar');

        // Mostramos el modal
        modal.classList.remove('hidden');

        // Si confirma, resolvemos con TRUE
        btnConfirmar.onclick = () => {
            modal.classList.add('hidden');
            resolve(true);
        };

        // Si cancela, resolvemos con FALSE
        btnCancelar.onclick = () => {
            modal.classList.add('hidden');
            resolve(false);
        };
    });
};

</script>
